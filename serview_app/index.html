<body>
  <div id="root"></div>
  <!--
    GitHub Pages SPA fallback restore (pairs with public/404.html). If we arrived
    via the 404 redirect (path encoded as ?/...), rewrite the address bar back to
    the real clean URL before React mounts so the router sees the intended path.
  -->
  <script>
    (function (l) {
      if (l.search[1] === "/") {
        var decoded = l.search
          .slice(1)
          .split("&")
          .map(function (s) { return s.replace(/~and~/g, "&"); })
          .join("?");
        window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
      }
    })(window.location);
  </script>
