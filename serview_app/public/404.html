<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ServView</title>
  <!--
    GitHub Pages SPA fallback (https://github.com/rafgraph/spa-github-pages).
    GitHub serves this file for any unknown path. It re-encodes the requested
    path into a query string and redirects to "/", where the restore snippet in
    index.html rewrites the real URL back before React mounts. The site is served
    from the domain root, so no path segments are kept.
  -->
  <script>
    (function () {
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/?/" +
        l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
        (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    })();
  </script>
</head>
<body></body>
</html>
